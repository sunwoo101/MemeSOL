name: Deploy Backend (Production)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./apps/backend/backend.csproj

      - name: Build
        run: dotnet build ./apps/backend/backend.csproj --configuration Release --no-restore

  deploy:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          fingerprint: ${{ secrets.VPS_FINGERPRINT }}
          script: |
            cd /var/www/ios-assignment-3
            git pull origin main
            docker compose -f docker-compose.prod.yml up --build -d
